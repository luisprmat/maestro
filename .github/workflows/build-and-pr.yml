name: Build and Create PRs

on:
  push:
    branches:
      - main

jobs:
  build-livewire:
    name: Build Livewire Kit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Maestro
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, curl

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build Livewire Kit
        run: php artisan build --kit=Livewire

      - name: Checkout Livewire Starter Kit
        uses: actions/checkout@v4
        with:
          repository: laravel/livewire-starter-kit
          path: livewire-starter-kit
          token: ${{ secrets.STARTER_KIT_TOKEN }}

      - name: Copy Build to Livewire Starter Kit
        run: |
          rm -rf livewire-starter-kit/*
          cp -r build/* livewire-starter-kit/
          cp -r build/.[!.]* livewire-starter-kit/ 2>/dev/null || true

      - name: Install and Lint Livewire Kit
        working-directory: livewire-starter-kit
        run: |
          composer install --no-interaction --prefer-dist
          composer lint

      - name: Create Pull Request for Livewire
        uses: peter-evans/create-pull-request@v6
        with:
          path: livewire-starter-kit
          token: ${{ secrets.STARTER_KIT_TOKEN }}
          commit-message: 'Update from Maestro'
          title: 'Update from Maestro'
          body: |
            This PR was automatically generated by Maestro.

            Triggered by commit: ${{ github.sha }}
          branch: maestro-update
          base: main

  build-react:
    name: Build React Kit
    runs-on: ubuntu-latest
    needs: build-livewire
    steps:
      - name: Checkout Maestro
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, curl

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build React Kit
        run: php artisan build --kit=React

      - name: Checkout React Starter Kit
        uses: actions/checkout@v4
        with:
          repository: laravel/react-starter-kit
          path: react-starter-kit
          token: ${{ secrets.STARTER_KIT_TOKEN }}

      - name: Copy Build to React Starter Kit
        run: |
          rm -rf react-starter-kit/*
          cp -r build/* react-starter-kit/
          cp -r build/.[!.]* react-starter-kit/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Lint React Kit
        working-directory: react-starter-kit
        run: |
          composer install --no-interaction --prefer-dist
          composer lint
          npm install
          npm run format
          npm run lint

      - name: Create Pull Request for React
        uses: peter-evans/create-pull-request@v6
        with:
          path: react-starter-kit
          token: ${{ secrets.STARTER_KIT_TOKEN }}
          commit-message: 'Update from Maestro'
          title: 'Update from Maestro'
          body: |
            This PR was automatically generated by Maestro.

            Triggered by commit: ${{ github.sha }}
          branch: maestro-update
          base: main

  build-vue:
    name: Build Vue Kit
    runs-on: ubuntu-latest
    needs: build-react
    steps:
      - name: Checkout Maestro
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, curl

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build Vue Kit
        run: php artisan build --kit=Vue

      - name: Checkout Vue Starter Kit
        uses: actions/checkout@v4
        with:
          repository: laravel/vue-starter-kit
          path: vue-starter-kit
          token: ${{ secrets.STARTER_KIT_TOKEN }}

      - name: Copy Build to Vue Starter Kit
        run: |
          rm -rf vue-starter-kit/*
          cp -r build/* vue-starter-kit/
          cp -r build/.[!.]* vue-starter-kit/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Lint Vue Kit
        working-directory: vue-starter-kit
        run: |
          composer install --no-interaction --prefer-dist
          composer lint
          npm install
          npm run format
          npm run lint

      - name: Create Pull Request for Vue
        uses: peter-evans/create-pull-request@v6
        with:
          path: vue-starter-kit
          token: ${{ secrets.STARTER_KIT_TOKEN }}
          commit-message: 'Update from Maestro'
          title: 'Update from Maestro'
          body: |
            This PR was automatically generated by Maestro.

            Triggered by commit: ${{ github.sha }}
          branch: maestro-update
          base: main
