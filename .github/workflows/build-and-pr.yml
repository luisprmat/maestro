name: Build and Create PRs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Livewire variants
          - name: Livewire Kit
            kit: Livewire
            build_flags: ''
            repository: laravel/livewire-starter-kit
            path: livewire-starter-kit
            branch: main
            pr_branch: maestro-update
            node: false

          - name: Livewire Kit (Blank)
            kit: Livewire
            build_flags: '--blank'
            repository: laravel/blank-livewire-starter-kit
            path: blank-livewire-starter-kit
            branch: main
            pr_branch: maestro-update
            node: false

          - name: Livewire Kit (WorkOS)
            kit: Livewire
            build_flags: '--workos'
            repository: laravel/livewire-starter-kit
            path: livewire-starter-kit
            branch: workos
            pr_branch: maestro-update-workos
            node: false

          - name: Livewire Kit (Components)
            kit: Livewire
            build_flags: '--components'
            repository: laravel/livewire-starter-kit
            path: livewire-starter-kit
            branch: components
            pr_branch: maestro-update-components
            node: false

          # React variants
          - name: React Kit
            kit: React
            build_flags: ''
            repository: laravel/react-starter-kit
            path: react-starter-kit
            branch: main
            pr_branch: maestro-update
            node: true

          - name: React Kit (Blank)
            kit: React
            build_flags: '--blank'
            repository: laravel/blank-react-starter-kit
            path: blank-react-starter-kit
            branch: main
            pr_branch: maestro-update
            node: true

          - name: React Kit (WorkOS)
            kit: React
            build_flags: '--workos'
            repository: laravel/react-starter-kit
            path: react-starter-kit
            branch: workos
            pr_branch: maestro-update-workos
            node: true

          # Vue variants
          - name: Vue Kit
            kit: Vue
            build_flags: ''
            repository: laravel/vue-starter-kit
            path: vue-starter-kit
            branch: main
            pr_branch: maestro-update
            node: true

          - name: Vue Kit (Blank)
            kit: Vue
            build_flags: '--blank'
            repository: laravel/blank-vue-starter-kit
            path: blank-vue-starter-kit
            branch: main
            pr_branch: maestro-update
            node: true

          - name: Vue Kit (WorkOS)
            kit: Vue
            build_flags: '--workos'
            repository: laravel/vue-starter-kit
            path: vue-starter-kit
            branch: workos
            pr_branch: maestro-update-workos
            node: true

    steps:
      - name: Checkout Maestro
        uses: actions/checkout@v6

      - name: Get Merged PR Information
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/get-merged-pr-info.js');
            await script({ github, context, core });

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, curl

      - name: Install Composer Dependencies
        working-directory: orchestrator
        run: composer install --no-interaction --prefer-dist

      - name: Build ${{ matrix.name }}
        working-directory: orchestrator
        run: php artisan build --kit=${{ matrix.kit }} ${{ matrix.build_flags }}

      - name: Checkout Starter Kit
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.branch }}
          path: ${{ matrix.path }}
          token: ${{ secrets.STARTER_KIT_TOKEN }}

      - name: Copy Build to Starter Kit
        working-directory: ${{ matrix.path }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r ../build/* .
          cp -r ../build/.[!.]* . 2>/dev/null || true

      - name: Check for Changes
        id: changes
        working-directory: ${{ matrix.path }}
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected, skipping PR creation."
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.has_changes == 'true' && matrix.node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Lint (Composer only)
        if: steps.changes.outputs.has_changes == 'true' && !matrix.node
        working-directory: ${{ matrix.path }}
        run: |
          composer install --no-interaction --prefer-dist
          composer lint

      - name: Install and Lint (Composer + Node)
        if: steps.changes.outputs.has_changes == 'true' && matrix.node
        working-directory: ${{ matrix.path }}
        run: |
          composer install --no-interaction --prefer-dist
          composer lint
          npm install
          npm run format
          npm run lint

      - name: Remove Lock Files
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: ${{ matrix.path }}
        run: rm -f composer.lock package-lock.json

      - name: Discard Permission-Only Changes
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: ${{ matrix.path }}
        run: |
          git diff --diff-filter=M --name-only | while read file; do
            if git diff "$file" | grep -q '^diff --git' && \
               ! git diff "$file" | grep -qE '^(\+[^+]|-[^-])'; then
              git checkout -- "$file"
            fi
          done

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          path: ${{ matrix.path }}
          token: ${{ secrets.STARTER_KIT_TOKEN }}
          commit-message: |
            ${{ steps.pr-info.outputs.title }}

            ${{ steps.pr-info.outputs.found == 'true' && format('Co-authored-by: {0} <{1}>', steps.pr-info.outputs.author, steps.pr-info.outputs.author_email) || '' }}
          title: ${{ steps.pr-info.outputs.title }}
          body: |
            This PR was automatically generated by Maestro.

            ${{ steps.pr-info.outputs.found == 'true' && format('**Source PR:** {0} by [@{1}]({2})', steps.pr-info.outputs.url, steps.pr-info.outputs.author, steps.pr-info.outputs.author_url) || format('**Triggered by commit:** {0}', github.sha) }}
          branch: ${{ matrix.pr_branch }}
          base: ${{ matrix.branch }}
